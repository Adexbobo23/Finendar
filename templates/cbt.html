<!DOCTYPE html>
<html lang="en">
<head>
   {% load static %}
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Finendar</title>
   <!-- FontAwesome-cdn include -->
   <link rel="stylesheet" href="{% static 'cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css' %}">
   <!-- Google fonts include -->
   <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800;900&amp;family=Poppins:wght@700;800&amp;display=swap" rel="stylesheet">
   <!-- Bootstrap-css include -->
   <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
   <!-- Animate-css include -->
   <link rel="stylesheet" href="{% static 'assets/css/animate.min.css' %}">
   <!-- Main-StyleSheet include -->
   <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
   <div class="wrapper overflow-hidden">
      <!-- Top content -->
      <div class="container-fluid">
         <div class="row">
            <div class="col-sm-6">
               <div class="logo_area pt-5 ps-5">
                  <a href="{% url 'take_exam' %}">
                     <img src="{% static 'img/FINBb-nb.png' %}" alt="image-not-found" width="100px" height="100px">
                  </a>
               </div>
            </div>
            <div class="col-sm-6 d-none d-sm-block">
               <div class="count_box d-flex float-end pt-5 pe-5">
                  <!-- Step Progress bar -->
                  <div class="count_progress clip-1">
                     <span class="progress-left">
                        <span class="progress_bar"></span>
                     </span>
                     <span class="progress-right">
                        <span class="progress_bar"></span>
                     </span>
                     <div class="progress-value">
                        <div id="value">100%</div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <div class="container">
         <form class="multisteps_form bg-white position-relative overflow-hidden" id="wizard" method="POST" action="https://jthemes.net/themes/html/quizo/thankyou/index-3.html">
            {% csrf_token %}
            {% for question in questions %}
            <div class="multisteps_form_panel step">
               <div class="question_title text-center text-uppercase">
                  <h1 class="animate__animated animate__fadeInRight animate_25ms">{{ question.text }}</h1>
               </div>
               <div class="question_number text-center text-uppercase text-white">
                  <span class="rounded-pill">Question {{ forloop.counter }} of {{ questions|length }}</span>
               </div>
               <div class="row pt-5 mt-4 form_items">
                  {% for option in question.answer_set.all %}
                  <div class="col-6">
                     <ul class="list-unstyled p-0">
                        {% cycle "" "animate__fadeInRight" as animation_class silent %}
                        <li class="step_{{ forloop.parentloop.counter }} {% if animation_class %}{{ animation_class }}{% endif %}">
                            <input id="opt_{{ option.id }}" type="radio" name="question_{{ question.id }}" value="{{ option.id }}">
                            <label for="opt_{{ option.id }}">{{ option.text }}</label>
                        </li>
                    </ul>                                  
                  </div>
                  {% endfor %}
               </div>
            </div>
            {% endfor %}
            <div class="form_btn">
               <button type="button" class="prev_btn position-absolute text-uppercase border-0" id="prevBtn" onclick="nextPrev(-1)"> <span><i class="fas fa-arrow-left"></i></span> Back</button>
               <button type="button" class="next_btn rounded-pill position-absolute text-uppercase text-white" id="nextBtn" onclick="nextPrev(1)">Next</button>
            </div>
         </form>
      </div>
   </div>


   <script>
      document.addEventListener('DOMContentLoaded', function() {
          var items = document.querySelectorAll('.step_{{ forloop.parentloop.counter }}');
          var delay = 0;
          items.forEach(function(item) {
              item.style.animationDelay = delay + 'ms';
              delay += 50;
          });
      });
  </script>
   <!-- jQuery-js include -->
   <script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
   <!-- Bootstrap-js include -->
   <script src="{% static 'assets/js/bootstrap.min.js' %}"></script>
   <!-- jQuery-counter-up-js include -->
   <script src="{% static 'assets/js/countdown.js' %}"></script>
   <!-- jQuery-validate-js include -->
   <script src="{% static 'assets/js/jquery.validate.min.js' %}"></script>
   <!-- Custom-js include -->
   <script src="{% static 'assets/js/script.js' %}"></script>
</body>
</html>
